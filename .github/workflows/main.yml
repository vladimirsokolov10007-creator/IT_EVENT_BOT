name: Weekly IT Events Report

on:
  schedule:
    # Запуск каждый понедельник в 09:00 по UTC (12:00 по Москве)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Эта строка позволяет запускать скрипт вручную для теста

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run script
      run: python main.py
